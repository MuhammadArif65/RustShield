name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  LITCRYPT_ENCRYPT_KEY: rustshield-static-key-2025

jobs:
  check:
    name: Check (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2

      - name: Install dependencies (Ubuntu)
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get update && sudo apt-get install -y libtss2-dev

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Clippy (default + string-obfuscation)
        run: cargo clippy --all-targets --features string-obfuscation -- -D warnings

      - name: Run tests
        run: cargo test --all

      - name: Build all
        run: cargo build --all

  check-linux-extras:
    name: Check Linux extras (tpm + string-obfuscation)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - uses: Swatinem/rust-cache@v2

      - name: Install tpm2-tss dev libraries
        run: sudo apt-get update && sudo apt-get install -y libtss2-dev

      - name: Clippy (tpm + string-obfuscation)
        run: cargo clippy --all-targets --features tpm,string-obfuscation -- -D warnings
